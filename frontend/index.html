<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solaris USAC - Fase 2</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* Estilos Base Solaris */
    :root {
      --bg: #020617; --surface: #0f172a; --surface-hover: #1e293b;
      --border: #334155; --accent: #10b981; --accent2: #38bdf8;
      --text: #f1f5f9; --muted: #94a3b8; --danger: #e11d48;
      --shadow: 0 10px 15px -3px rgba(0,0,0,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    
    .app-container { max-width: 1000px; margin: 0 auto; padding: 0 20px 100px; }
    
    /* Nav */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0; border-bottom: 1px solid var(--border);
      margin-bottom: 30px; position: sticky; top: 0; background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(10px); z-index: 100;
    }
    .nav-links { display: flex; gap: 20px; }
    .nav-links button { background: none; border: none; color: var(--muted); cursor: pointer; font-weight: 600; font-size: 15px; transition: .2s; }
    .nav-links button.active { color: var(--accent); }

    /* Cards & Layout */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow); }
    .badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; margin-right: 10px; }
    .badge-curso { background: rgba(16,185,129,0.1); color: var(--accent); border: 1px solid rgba(16,185,129,0.2); }
    
    /* Forms */
    input, select, textarea { width: 100%; background: #020617; border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: var(--text); margin-top: 5px; }
    .btn { padding: 12px 20px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: .2s; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #020617; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }

    /* Modal */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(5px); }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 30px; width: 90%; max-width: 500px; }

    /* Perfil Stats */
    .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 32px; color: #020617; font-weight: 800; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const API = axios.create({ baseURL: 'http://localhost:3001/api' });

    // Auth Interceptor
    API.interceptors.request.use(cfg => {
      const token = localStorage.getItem('token');
      if (token) cfg.headers.Authorization = `Bearer ${token}`;
      return cfg;
    });

    function App() {
      const [token, setToken] = useState(localStorage.getItem('token'));
      const [usuario, setUsuario] = useState(JSON.parse(localStorage.getItem('usuario') || 'null'));
      const [view, setView] = useState('feed'); // 'feed' | 'perfil' | 'cursos'

      const login = (t, u) => {
        localStorage.setItem('token', t);
        localStorage.setItem('usuario', JSON.stringify(u));
        setToken(t); setUsuario(u);
      };

      const logout = () => {
        localStorage.clear(); setToken(null); setUsuario(null);
      };

      if (!token) return <AuthScreen onLogin={login} />;

      return (
        <div className="app-container">
          <nav>
            <div style={{fontWeight:800, fontSize:20}}>SOLARIS<span style={{color:'var(--accent)'}}>USAC</span></div>
            <div className="nav-links">
              <button className={view === 'feed' ? 'active' : ''} onClick={() => setView('feed')}>Feed</button>
              <button className={view === 'cursos' ? 'active' : ''} onClick={() => setView('cursos')}>Cursos</button>
              <button className={view === 'perfil' ? 'active' : ''} onClick={() => setView('perfil')}>Mi Perfil</button>
            </div>
            <button className="btn btn-ghost" onClick={logout} style={{padding:'8px 15px'}}>Salir</button>
          </nav>

          {view === 'feed' && <FeedView usuario={usuario} />}
          {view === 'perfil' && <PerfilView usuario={usuario} />}
          {view === 'cursos' && <CursosView />}
        </div>
      );
    }

    // --- VISTAS ---

    function FeedView({ usuario }) {
      const [posts, setPosts] = useState([]);
      const [showNew, setShowNew] = useState(false);
      const [selected, setSelected] = useState(null);

      const load = async () => {
        try { const { data } = await API.get('/publicaciones'); setPosts(data); } catch { setPosts([]); }
      };

      useEffect(() => { load(); }, []);

      return (
        <div>
          <div style={{display:'flex', justifyContent:'space-between', marginBottom:20}}>
            <h2>Explorar Publicaciones</h2>
            <button className="btn btn-primary" onClick={() => setShowNew(true)}>+ Nueva</button>
          </div>
          {posts.map(p => (
            <div className="card" key={p.id}>
              <div style={{marginBottom:10}}>
                <span className={`badge badge-curso`}>{p.tipo}</span>
                <small style={{color:'var(--muted)'}}>Publicado por {p.nombres}</small>
              </div>
              <p>{p.mensaje}</p>
              <button className="btn btn-ghost" style={{marginTop:15, fontSize:13}} onClick={() => setSelected(p)}>
                💬 {p.total_comentarios} Comentarios
              </button>
            </div>
          ))}
          {showNew && <NewPostModal onDone={() => {setShowNew(false); load();}} onClose={() => setShowNew(false)} />}
          {selected && <CommentsModal post={selected} onClose={() => setSelected(null)} />}
        </div>
      );
    }

    function PerfilView({ usuario }) {
      const [myPosts, setMyPosts] = useState([]);
      
      useEffect(() => {
        API.get('/publicaciones').then(r => {
          // Filtrar por el registro del usuario logueado
          setMyPosts(r.data.filter(p => p.registro === usuario.registro));
        });
      }, []);

      return (
        <div>
          <div className="profile-header">
            <div className="profile-avatar">{usuario.nombres[0]}</div>
            <div>
              <h1>{usuario.nombres} {usuario.apellidos}</h1>
              <p style={{color:'var(--muted)'}}>Registro: {usuario.registro} | {usuario.correo}</p>
            </div>
          </div>
          <h3>Mis Publicaciones ({myPosts.length})</h3>
          <div style={{marginTop:20}}>
            {myPosts.map(p => (
              <div className="card" key={p.id} style={{borderColor:'var(--accent)'}}>
                <p>{p.mensaje}</p>
                <small style={{color:'var(--muted)'}}>{new Date(p.creado_en).toLocaleDateString()}</small>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function CursosView() {
      const [cursos, setCursos] = useState([]);
      useEffect(() => { API.get('/cursos').then(r => setCursos(r.data)); }, []);

      return (
        <div>
          <h2>Cursos Aprobados</h2>
          <p className="subtitle">Listado de materias registradas en el sistema académico.</p>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:15, marginTop:20}}>
            {cursos.map(c => (
              <div className="card" key={c.id} style={{margin:0}}>
                <h4 style={{color:'var(--accent2)'}}>{c.nombre}</h4>
                <p style={{fontSize:13, color:'var(--muted)'}}>Código: {c.id}</p>
                <div style={{marginTop:10, color:'var(--success)', fontWeight:700, fontSize:12}}>✓ APROBADO</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // --- MODALES (Lógica de Integración) ---

    function NewPostModal({ onDone, onClose }) {
      const [form, setForm] = useState({ tipo:'curso', referencia_id:'', mensaje:'' });
      const [options, setOptions] = useState([]);

      useEffect(() => {
        const path = form.tipo === 'curso' ? '/cursos' : '/catedraticos';
        API.get(path).then(r => setOptions(r.data));
      }, [form.tipo]);

      const submit = async () => {
        try { await API.post('/publicaciones', form); onDone(); } catch { alert("Error"); }
      };

      return (
        <div className="overlay">
          <div className="modal">
            <h2>Crear Publicación</h2>
            <select onChange={e => setForm({...form, tipo: e.target.value})}>
              <option value="curso">Sobre un Curso</option>
              <option value="catedratico">Sobre un Catedrático</option>
            </select>
            <select onChange={e => setForm({...form, referencia_id: e.target.value})}>
              <option>Seleccionar...</option>
              {options.map(o => <option key={o.id} value={o.id}>{o.nombre}</option>)}
            </select>
            <textarea placeholder="Tu reseña..." onChange={e => setForm({...form, mensaje: e.target.value})} />
            <div style={{display:'flex', gap:10, marginTop:20}}>
              <button className="btn btn-primary" onClick={submit} style={{flex:1}}>Publicar</button>
              <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
            </div>
          </div>
        </div>
      );
    }

    function CommentsModal({ post, onClose }) {
      const [list, setList] = useState([]);
      const [txt, setTxt] = useState('');

      const load = () => API.get(`/publicaciones/${post.id}/comentarios`).then(r => setList(r.data));
      useEffect(() => { load(); }, []);

      const send = async () => {
        await API.post(`/publicaciones/${post.id}/comentarios`, { mensaje: txt });
        setTxt(''); load();
      };

      return (
        <div className="overlay">
          <div className="modal">
            <h3>Comentarios</h3>
            <div style={{maxHeight:200, overflow:'auto', margin:'15px 0'}}>
              {list.map(c => (
                <div key={c.id} style={{padding:'8px 0', borderBottom:'1px solid var(--border)'}}>
                  <small style={{color:'var(--accent)'}}>{c.nombres}:</small>
                  <p style={{fontSize:14}}>{c.mensaje}</p>
                </div>
              ))}
            </div>
            <input value={txt} onChange={e => setTxt(e.target.value)} placeholder="Escribe algo..." />
            <button className="btn btn-primary" onClick={send} style={{width:'100%', marginTop:10}}>Enviar</button>
            <button className="btn btn-ghost" onClick={onClose} style={{width:'100%', marginTop:5}}>Cerrar</button>
          </div>
        </div>
      );
    }

    // AuthScreen, LoginForm, RegistroForm se mantienen similares al anterior...
    // (Por brevedad, se asume que ya están funcionando e integrados)
    // Pero aquí coloco el LoginForm básico para que el código sea funcional:

    function AuthScreen({ onLogin }) {
      const [reg, setReg] = useState(false);
      return (
        <div style={{display:'flex', justifyContent:'center', alignItems:'center', height:'100vh'}}>
          {reg ? <RegistroForm onBack={() => setReg(false)} /> : <LoginForm onLogin={onLogin} onGoReg={() => setReg(true)} />}
        </div>
      );
    }

    function LoginForm({ onLogin, onGoReg }) {
      const [f, setF] = useState({ registro:'', contrasena:'' });
      const submit = async () => {
        try {
          const { data } = await API.post('/auth/login', f);
          onLogin(data.token, data.usuario);
        } catch { alert("Credenciales incorrectas"); }
      };
      return (
        <div className="card" style={{width:350}}>
          <h2>Solaris USAC</h2>
          <input placeholder="Carnet" onChange={e => setF({...f, registro: e.target.value})} />
          <input type="password" placeholder="Pass" onChange={e => setF({...f, contrasena: e.target.value})} />
          <button className="btn btn-primary" onClick={submit} style={{width:'100%', marginTop:15}}>Entrar</button>
          <button onClick={onGoReg} style={{background:'none', border:'none', color:'var(--accent)', marginTop:15, cursor:'pointer'}}>Crear cuenta</button>
        </div>
      );
    }

    function RegistroForm({ onBack }) {
      const [f, setF] = useState({ registro:'', nombres:'', apellidos:'', correo:'', contrasena:'' });
      const submit = async () => {
        await API.post('/auth/registro', f);
        alert("¡Creado!"); onBack();
      };
      return (
        <div className="card" style={{width:350}}>
          <h2>Registro</h2>
          <input placeholder="Carnet" onChange={e => setF({...f, registro: e.target.value})} />
          <input placeholder="Nombres" onChange={e => setF({...f, nombres: e.target.value})} />
          <input placeholder="Apellidos" onChange={e => setF({...f, apellidos: e.target.value})} />
          <input placeholder="Correo" onChange={e => setF({...f, correo: e.target.value})} />
          <input type="password" placeholder="Pass" onChange={e => setF({...f, contrasena: e.target.value})} />
          <button className="btn btn-primary" onClick={submit} style={{width:'100%', marginTop:15}}>Registrar</button>
          <button onClick={onBack} style={{background:'none', border:'none', color:'var(--muted)', marginTop:15, cursor:'pointer'}}>Volver</button>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
